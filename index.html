<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navettes Domicile-Travail - INSEE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animation pour l'apparition des résultats */
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Transition fluide pour les barres de progression */
        .progress-bar {
            transition: width 1s ease-out;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8 text-center">
            <div class="mx-auto bg-blue-100 w-16 h-16 flex items-center justify-center rounded-full mb-4">
                <!-- Icon MapPin -->
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600 w-8 h-8">
                    <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>
                </svg>
            </div>
            <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-2">
                Lieu de travail des résidents
            </h1>
            <p class="text-slate-500">
                Saisissez un Code INSEE pour analyser les flux de navettes domicile-travail.
            </p>
        </header>

        <!-- Search Form -->
        <form id="searchForm" class="relative">
            <div class="flex items-center bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all">
                <div class="pl-4">
                    <!-- Icon Search -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400 w-5 h-5">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                    </svg>
                </div>
                <input
                    type="text"
                    id="inseeInput"
                    placeholder="Ex: 33063 (Bordeaux), 75056 (Paris)..."
                    class="w-full py-4 px-4 outline-none text-lg text-slate-700 placeholder-slate-400"
                    pattern="[A-Za-z0-9\-]+"
                    maxlength="15"
                    required
                />
                <button
                    type="submit"
                    id="submitBtn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 md:px-8 py-4 font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <span id="btnText">Analyser</span>
                </button>
            </div>
        </form>

        <!-- Notifications Container -->
        <div id="errorContainer" class="hidden bg-amber-50 border border-amber-200 rounded-xl p-4 flex items-start gap-3">
            <!-- Icon Alert -->
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-500 w-5 h-5 mt-0.5 flex-shrink-0">
                <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
            </svg>
            <div class="text-amber-800 text-sm">
                <p class="font-semibold mb-1">Information API</p>
                <p id="errorMessage"></p>
            </div>
        </div>

        <!-- Results Container -->
        <div id="resultsContainer"></div>

    </div>

    <!-- Core Logic Application -->
    <script>
        // Dictionnaire de traduction des codes WORK_AREA de l'INSEE
        const WORK_AREA_LABELS = {
            "1": "Commune de résidence",
            "2": "Autre commune du département de résidence",
            "3": "Autre département de la région de résidence",
            "4": "Autre région en France métropolitaine ou DOM",
            "5": "Étranger",
            "_T": "Total",
            "Z": "Non applicable / Sans objet"
        };

        // Données de secours
        const getMockResults = () => ({
            "1": 45201.50,
            "2": 18302.20,
            "3": 2150.80,
            "4": 850.00,
            "5": 120.00,
            "_T": 66624.50
        });

        const processData = (parsedResults) => {
            const total = Object.entries(parsedResults).reduce((acc, [wa, val]) => {
                return wa !== '_T' ? acc + val : acc;
            }, 0);

            const formattedData = Object.entries(parsedResults)
                .filter(([wa, _]) => wa !== '_T')
                .map(([wa, val]) => ({
                    code: wa,
                    label: WORK_AREA_LABELS[wa] || `Code inconnu (${wa})`,
                    value: val,
                    percentage: total > 0 ? (val / total) * 100 : 0
                }))
                .sort((a, b) => b.value - a.value);

            return { total, details: formattedData };
        };

        // UI Manipulation Elements
        const form = document.getElementById('searchForm');
        const input = document.getElementById('inseeInput');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const errorContainer = document.getElementById('errorContainer');
        const errorMessage = document.getElementById('errorMessage');
        const resultsContainer = document.getElementById('resultsContainer');

        const setLoadingState = (isLoading) => {
            input.disabled = isLoading;
            submitBtn.disabled = isLoading || !input.value.trim();
            btnText.textContent = isLoading ? 'Recherche...' : 'Analyser';
        };

        const showError = (msg) => {
            if (msg) {
                errorMessage.textContent = msg;
                errorContainer.classList.remove('hidden');
            } else {
                errorContainer.classList.add('hidden');
            }
        };

        const renderResults = (data, isUsingMock, inseeCode) => {
            if (!data) {
                resultsContainer.innerHTML = '';
                return;
            }

            let detailsHTML = '';
            
            if (data.details.length === 0) {
                detailsHTML = `<p class="text-slate-500 text-center py-4">Aucune donnée trouvée pour ce code INSEE.</p>`;
            } else {
                data.details.forEach(item => {
                    detailsHTML += `
                        <div class="space-y-2">
                            <div class="flex justify-between items-end">
                                <span class="font-medium text-slate-700">${item.label}</span>
                                <div class="text-right">
                                    <span class="text-lg font-bold text-slate-900">${item.percentage.toFixed(1)}%</span>
                                    <span class="text-sm text-slate-500 ml-2">(${Math.round(item.value).toLocaleString('fr-FR')})</span>
                                </div>
                            </div>
                            <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                                <div class="bg-blue-500 h-full rounded-full progress-bar" style="width: 0%;" data-target="${item.percentage}%"></div>
                            </div>
                        </div>
                    `;
                });
            }

            const mockBadge = isUsingMock 
                ? `<span class="inline-block mt-2 text-xs font-medium bg-amber-100 text-amber-800 px-2 py-1 rounded-full">Données simulées</span>` 
                : '';

            resultsContainer.innerHTML = `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden fade-in">
                    <div class="p-6 md:p-8 border-b border-slate-100 flex items-center justify-between">
                        <div>
                            <h2 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-blue-500"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
                                Résultats pour le code ${inseeCode}
                            </h2>
                            ${mockBadge}
                        </div>
                        <div class="text-right">
                            <p class="text-sm text-slate-500 font-medium uppercase tracking-wider">Population Active</p>
                            <p class="text-2xl font-bold text-blue-600">${Math.round(data.total).toLocaleString('fr-FR')}</p>
                        </div>
                    </div>
                    <div class="p-6 md:p-8 space-y-6">
                        ${detailsHTML}
                    </div>
                    <div class="bg-slate-50 p-4 border-t border-slate-100 text-xs text-slate-500 flex items-center gap-2 justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                        Source : INSEE - Données du Recensement de la Population
                    </div>
                </div>
            `;

            // Trigger animations for progress bars
            setTimeout(() => {
                const bars = resultsContainer.querySelectorAll('.progress-bar');
                bars.forEach(bar => {
                    bar.style.width = bar.getAttribute('data-target');
                });
            }, 50);
        };

        // Listeners
        input.addEventListener('input', () => {
            submitBtn.disabled = !input.value.trim();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const inseeCode = input.value.trim();
            if (!inseeCode) return;

            setLoadingState(true);
            showError('');
            resultsContainer.innerHTML = '';
            
            let dataToRender = null;
            let isUsingMock = false;

            try {
                // Construction de l'URL comme dans votre exemple : utilisation de JSON et de paramètres URL
                // On fixe les autres dimensions (AGE, TRANS...) d'après votre fichier CSV pour éviter les doublons.
                const url = `https://api.insee.fr/melodi/data/DS_RP_NAVETTES_PRINC?GEO=${inseeCode}&TRANS=2&AGE=Y_GE15&EMPSTA_ENQ=1&RP_MEASURE=POP&FREQ=A`;
                
                const response = await fetch(url, {
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) {
                    const text = await response.text();
                    throw new Error(`Erreur HTTP ${response.status} : ${text}`);
                }

                const data = await response.json();
                const observations = data.observations || [];
                
                if (observations.length === 0) {
                    throw new Error("Aucune donnée trouvée pour ce code INSEE avec ces paramètres.");
                }

                const parsedResults = {};

                observations.forEach(obs => {
                    const dimensions = obs.dimensions || {};
                    const workArea = dimensions.WORK_AREA;
                    
                    let val = 0;
                    if (obs.measures) {
                        // On prend la première mesure disponible dynamiquement (OBS_VALUE, OBS_VALUE_NIVEAU...)
                        const measureKey = Object.keys(obs.measures)[0];
                        if (measureKey && obs.measures[measureKey].value !== undefined) {
                            val = Number(obs.measures[measureKey].value);
                        }
                    }

                    if (workArea && !isNaN(val)) {
                        parsedResults[workArea] = (parsedResults[workArea] || 0) + val;
                    }
                });

                dataToRender = processData(parsedResults);

            } catch (err) {
                console.warn("Échec de l'appel API, utilisation des données de démonstration.", err);
                showError(`${err.message} - Affichage de données simulées.`);
                isUsingMock = true;
                dataToRender = processData(getMockResults());
            } finally {
                setLoadingState(false);
                renderResults(dataToRender, isUsingMock, inseeCode);
            }
        });
    </script>
</body>
</html>
