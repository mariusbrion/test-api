<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navettes Domicile-Travail - INSEE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import de sql.js (WebAssembly) 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .progress-bar { transition: width 1s ease-out; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8 text-center">
            <div class="mx-auto bg-blue-100 w-16 h-16 flex items-center justify-center rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600 w-8 h-8"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-2">
                Lieu de travail des résidents
            </h1>
            <p class="text-slate-500 mb-6">
                Chargez votre base de données locale pour analyser les flux.
            </p>
            
            <!-- Zone de Glisser-Déposer -->
            <div id="dropZone" class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center bg-slate-50 hover:bg-slate-100 transition-colors cursor-pointer mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-auto text-slate-400 w-10 h-10 mb-3"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                <p class="text-slate-600">Glissez-déposez le fichier <b>data.sqlite</b> ici<br>ou cliquez pour le sélectionner.</p>
                <input type="file" id="fileInput" accept=".sqlite,.db" class="hidden" />
            </div>

            <!-- Status de chargement de la base de données -->
            <div id="dbStatus" class="hidden inline-flex items-center gap-2 px-3 py-1 rounded-full text-sm font-medium bg-amber-100 text-amber-800">
                <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Chargement de la base en cours...
            </div>
        </header>

        <!-- Search Form -->
        <form id="searchForm" class="relative">
            <div class="flex items-center bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all">
                <div class="pl-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400 w-5 h-5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </div>
                <input type="text" id="inseeInput" placeholder="Ex: 33063 (Bordeaux), 75056 (Paris)..." class="w-full py-4 px-4 outline-none text-lg text-slate-700 placeholder-slate-400 disabled:bg-slate-50" pattern="[A-Za-z0-9\-]+" maxlength="15" required disabled />
                <button type="submit" id="submitBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 md:px-8 py-4 font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <span id="btnText">Analyser</span>
                </button>
            </div>
        </form>

        <div id="errorContainer" class="hidden bg-amber-50 border border-amber-200 rounded-xl p-4 flex items-start gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-500 w-5 h-5 mt-0.5 flex-shrink-0"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
            <div class="text-amber-800 text-sm">
                <p class="font-semibold mb-1">Erreur</p>
                <p id="errorMessage"></p>
            </div>
        </div>

        <!-- Results Container -->
        <div id="resultsContainer"></div>

    </div>

    <!-- Core Logic Application -->
    <script>
        const WORK_AREA_LABELS = {
            "1": "Commune de résidence",
            "2": "Autre commune du département de résidence",
            "3": "Autre département de la région de résidence",
            "4": "Autre région en France métropolitaine ou DOM",
            "5": "Étranger",
            "_T": "Total",
            "Z": "Non applicable / Sans objet"
        };

        let db = null;

        // UI Elements
        const form = document.getElementById('searchForm');
        const input = document.getElementById('inseeInput');
        const submitBtn = document.getElementById('submitBtn');
        const errorContainer = document.getElementById('errorContainer');
        const errorMessage = document.getElementById('errorMessage');
        const resultsContainer = document.getElementById('resultsContainer');
        const dbStatus = document.getElementById('dbStatus');
        
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        // Configuration Drag & Drop
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-blue-500', 'bg-blue-50');
        });
        
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
            if (e.dataTransfer.files.length) {
                loadDatabaseFromFile(e.dataTransfer.files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                loadDatabaseFromFile(e.target.files[0]);
            }
        });

        // Chargement local de la base de données SQLite
        async function loadDatabaseFromFile(file) {
            dbStatus.classList.remove('hidden');
            dropZone.style.display = 'none'; // On cache la zone de drop
            
            try {
                // Chargement du moteur WebAssembly (sql.js)
                const config = { locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}` };
                const SQL = await initSqlJs(config);
                
                // Lecture du fichier depuis le disque dur de l'utilisateur
                const arrayBuffer = await file.arrayBuffer();
                db = new SQL.Database(new Uint8Array(arrayBuffer));
                
                // Base de données chargée avec succès !
                dbStatus.className = "mt-4 inline-flex items-center gap-2 px-3 py-1 rounded-full text-sm font-medium bg-emerald-100 text-emerald-800";
                dbStatus.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg> Base chargée : ${file.name}`;
                
                // On active la barre de recherche
                input.disabled = false;
                input.focus();
                
            } catch (err) {
                console.error(err);
                dbStatus.className = "mt-4 inline-flex items-center gap-2 px-3 py-1 rounded-full text-sm font-medium bg-red-100 text-red-800";
                dbStatus.innerHTML = "Échec du chargement du fichier.";
                showError("Le fichier fourni n'a pas pu être lu comme une base de données SQLite valide.");
                dropZone.style.display = 'block'; // On réaffiche pour réessayer
            }
        }

        const showError = (msg) => {
            if (msg) {
                errorMessage.textContent = msg;
                errorContainer.classList.remove('hidden');
            } else {
                errorContainer.classList.add('hidden');
            }
        };

        const renderResults = (data, inseeCode, year) => {
            if (!data) {
                resultsContainer.innerHTML = '';
                return;
            }

            let detailsHTML = '';
            
            if (data.details.length === 0) {
                detailsHTML = `<p class="text-slate-500 text-center py-4">Aucune donnée trouvée pour ce code INSEE dans la base.</p>`;
            } else {
                data.details.forEach(item => {
                    detailsHTML += `
                        <div class="space-y-2">
                            <div class="flex justify-between items-end">
                                <span class="font-medium text-slate-700">${item.label}</span>
                                <div class="text-right">
                                    <span class="text-lg font-bold text-slate-900">${item.percentage.toFixed(1)}%</span>
                                    <span class="text-sm text-slate-500 ml-2">(${Math.round(item.value).toLocaleString('fr-FR')})</span>
                                </div>
                            </div>
                            <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                                <div class="bg-blue-500 h-full rounded-full progress-bar" style="width: 0%;" data-target="${item.percentage}%"></div>
                            </div>
                        </div>
                    `;
                });
            }

            resultsContainer.innerHTML = `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden fade-in">
                    <div class="p-6 md:p-8 border-b border-slate-100 flex items-center justify-between">
                        <div>
                            <h2 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-blue-500"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
                                Résultats pour le code ${inseeCode}
                            </h2>
                            <span class="inline-block mt-2 text-xs font-medium bg-blue-100 text-blue-800 px-2 py-1 rounded-full">Millésime ${year}</span>
                        </div>
                        <div class="text-right">
                            <p class="text-sm text-slate-500 font-medium uppercase tracking-wider">Population Active</p>
                            <p class="text-2xl font-bold text-blue-600">${Math.round(data.total).toLocaleString('fr-FR')}</p>
                        </div>
                    </div>
                    <div class="p-6 md:p-8 space-y-6">
                        ${detailsHTML}
                    </div>
                    <div class="bg-slate-50 p-4 border-t border-slate-100 text-xs text-slate-500 flex items-center gap-2 justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                        Source : Fichier data.sqlite local (Requête locale WebAssembly)
                    </div>
                </div>
            `;

            setTimeout(() => {
                const bars = resultsContainer.querySelectorAll('.progress-bar');
                bars.forEach(bar => {
                    bar.style.width = bar.getAttribute('data-target');
                });
            }, 50);
        };

        // Listeners
        input.addEventListener('input', () => {
            submitBtn.disabled = !input.value.trim() || !db;
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!db) return;
            
            const inseeCode = input.value.trim().toUpperCase();
            if (!inseeCode) return;

            showError('');
            resultsContainer.innerHTML = '';
            
            try {
                // 1. Trouver le millésime (année) le plus récent pour ce code
                const yearStmt = db.prepare("SELECT MAX(TIME_PERIOD) as latest_year FROM navettes WHERE GEO = :geo");
                yearStmt.bind({':geo': inseeCode});
                let latestYear = null;
                if (yearStmt.step()) {
                    latestYear = yearStmt.getAsObject().latest_year;
                }
                yearStmt.free();

                if (!latestYear) {
                    throw new Error(`Aucune donnée trouvée pour le code ${inseeCode}.`);
                }

                // 2. Exécution de la requête SQL locale en filtrant sur l'année la plus récente
                const stmt = db.prepare("SELECT WORK_AREA, SUM(OBS_VALUE) as total_val FROM navettes WHERE GEO = :geo AND TIME_PERIOD = :year AND WORK_AREA != '_T' GROUP BY WORK_AREA");
                stmt.bind({':geo': inseeCode, ':year': latestYear});
                
                let total = 0;
                const results = [];

                while (stmt.step()) {
                    const row = stmt.getAsObject();
                    const val = row.total_val;
                    total += val;
                    results.push({
                        code: row.WORK_AREA,
                        label: WORK_AREA_LABELS[row.WORK_AREA] || `Code inconnu (${row.WORK_AREA})`,
                        value: val
                    });
                }
                
                stmt.free();

                if (results.length === 0) {
                    throw new Error(`Aucune donnée trouvée pour le code ${inseeCode} en ${latestYear}.`);
                }

                // Calcul des pourcentages et tri
                const formattedData = results.map(item => ({
                    ...item,
                    percentage: total > 0 ? (item.value / total) * 100 : 0
                })).sort((a, b) => b.value - a.value);

                renderResults({ total, details: formattedData }, inseeCode, latestYear);

            } catch (err) {
                console.error(err);
                showError(err.message);
            }
        });
    </script>
</body>
</html>
